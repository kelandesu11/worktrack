services:
  db:
    image: postgres:16
    container_name: worktrack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Km15578!
      POSTGRES_DB: worktrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worktrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: worktrack-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:Km15578!@db:5432/worktrack
      jwt_secret_key: your-secret-key
      jwt_algorithm: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_MINUTES: 10080
      TOTP_ISSUER: WorkTrack
      APP_NAME: WorkTrack Backend
      APP_VERSION: 0.1.0
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: worktrack-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"

volumes:
  postgres_data: